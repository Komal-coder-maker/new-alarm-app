<head>

    <style>
        * {
            margin: 0;

        body {

        }

        .app-container {
            max-width: 600px;

        /* Header */
        .header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2em;
            font-weight: 800;
            color: #fff;
            font-family: cursive;
        }

        .header p {
            font-size: 17px;
            opacity: 0.7;
            margin-top: 5px;
            color: wheat;
        }

        /* Digital Clock */
        .digital-clock {
            background: #fff;
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #clockTime {
            font-family: 'Courier New', monospace;

        #clockDate {

        /* Add Alarm Button */
        .add-alarm-btn {
            width: 100%;

            background: #fff;
            border: none;
            border-radius: 30px;
            color: #1a1a2e;

            cursor: pointer;
            margin-bottom: 25px;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .add-alarm-btn:active {
            transform: scale(0.98);
        }

        /* Alarm List */
        .alarm-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .alarm-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alarm-time-large {
            font-size: 2em;
            font-weight: bold;
            font-family: monospace;
            color: #1a1a2e;
        }

        .alarm-ampm {
            font-size: 1rem;
            margin-left: 0px;
            color: red;
            font-family: Arial, Helvetica, sans-serif;
        }

        .alarm-days {
            font-size: 1rem;
            font-weight: 400;
            font-family: Georgia, 'Times New Roman', Times, serif;
            margin-top: 5px;
            color: #1a1a2e;
        }

        .alarm-ringtone {
            font-size: 1rem;
            
            margin-top: 3px;
            color: black;
             font-weight: 400;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        .alarm-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .edit-btn {
            background: #3498db;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-size: 0.85em;
            font-weight: 600;
        }

        .delete-btn {
            background: #e74c3c;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-size: 0.85em;
            font-weight: 600;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #e74c3c;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            background: #fff;
            border-radius: 20px;
            color:black;
            font-weight: 900;
        }

        /* Modal for Edit/Add */

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        /* Ringing Overlay */

<body>

<div class="app-container">
    <div class="header">
        <h1>⏰ Alarm App</h1>
        <p>Rise and shine ! The world is waiting for you ☀️</p>
    </div>

    <!-- Digital Clock -->
    <div class="digital-clock">
        <div id="clockTime">--:--:--</div>
        <div id="clockDate">Loading...</div>
    </div>

    <!-- Add Alarm Button -->
    <button class="add-alarm-btn" onclick="openAddModal()">+ ADD NEW ALARM</button>

    
    <div id="alarmList" class="alarm-list">
        <div class="empty-state"> No alarms yet<br>Click + ADD NEW ALARM</div>
    </div>
</div>

<!-- Edit/Add Modal -->
<div id="alarmModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Add New Alarm</h2>
        <input type="time" id="modalTime" class="modal-time-input">
        
        <div class="modal-days-grid" id="modalDaysGrid">
            <button class="modal-day-btn" data-day="mon">Mon</button>
            <button class="modal-day-btn" data-day="tue">Tue</button>
            <button class="modal-day-btn" data-day="wed">Wed</button>
            <button class="modal-day-btn" data-day="thu">Thu</button>
            <button class="modal-day-btn" data-day="fri">Fri</button>
            <button class="modal-day-btn" data-day="sat">Sat</button>
            <button class="modal-day-btn" data-day="sun">Sun</button>
            <button class="modal-day-btn everyday-modal-btn" onclick="selectEverydayModal()">Everyday</button>
        </div>
      <select id="modalRingtone" class="modal-ringtone" onchange="previewRingtone()">
    <option value="realalarm">⏰ Real Alarm Clock</option>
    <option value="classicclock">🕰️ Classic Grandfather Clock</option>
    <option value="guitar">🎸 Acoustic Guitar</option>
    <option value="piano">🎹 Grand Piano</option>
    <option value="birds">🐦 Birds & Nature</option>
    <option value="digital">📱 Modern Digital</option>
    <option value="morningchime">🔔 Morning Chime</option>
    <option value="sunrise">🌅 Sunrise Melody</option>
    <option value="dreamy">💭 Dreamy Piano</option>
    <option value="energetic">⚡ Energetic Beat</option>
</select>

        <div class="modal-buttons">
            <button class="save-btn" onclick="saveAlarmFromModal()">Save</button>
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Ringing Overlay -->
<div id="ringingOverlay" class="ringing-overlay">
    <div class="ringing-card">
        <div class="ringing-time" id="ringingTime">--:--:-- --</div>
        <div class="ringing-buttons">
            <button class="snooze-btn" onclick="snoozeAlarm(5)">⏰ Snooze 5min</button>
            <button class="snooze-btn" onclick="snoozeAlarm(10)">⏰ Snooze 10min</button>
            <button class="snooze-btn" onclick="snoozeAlarm(15)">⏰ Snooze 15min</button>
            <button class="dismiss-btn" onclick="dismissAlarm()">✖ Dismiss</button>
        </div>
    </div>
</div>

<script>
    // Variables
    let alarms = [];
    let editingAlarmId = null;
    let selectedDays = [];
    let ringingAlarmId = null;
    let audioContext = null;
    let ringInterval = null;
    let currentRingingAlarm = null;

    const dayNames = { 'mon': 'Mon', 'tue': 'Tue', 'wed': 'Wed', 'thu': 'Thu', 'fri': 'Fri', 'sat': 'Sat', 'sun': 'Sun' };
    const dayMapping = { 'sun': 0, 'mon': 1, 'tue': 2, 'wed': 3, 'thu': 4, 'fri': 5, 'sat': 6 };

    // Load alarms
    function loadAlarms() {
        const saved = localStorage.getItem('finalAlarmsV2');
        if (saved) {
            alarms = JSON.parse(saved);
        }
        renderAlarms();
    }

    // Save alarms
    function saveAlarms() {
        localStorage.setItem('finalAlarmsV2', JSON.stringify(alarms));
    }

    // Convert to 12hr format with AM/PM
    function getTimeDisplay(hours, minutes) {
        let displayHour = hours % 12;
        displayHour = displayHour === 0 ? 12 : displayHour;
        const ampm = hours >= 12 ? 'PM' : 'AM';
        return `${displayHour}:${minutes.toString().padStart(2,'0')}`;
    }

    // Get full time with seconds for ringing screen
    function getFullTimeWithAMPM(hours, minutes, seconds) {
        let displayHour = hours % 12;
        displayHour = displayHour === 0 ? 12 : displayHour;
        const ampm = hours >= 12 ? 'PM' : 'AM';
        return `${displayHour}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')} ${ampm}`;
    }

    // Get day names string
    function getDayNames(days) {
        if (days.length === 7) return "Everyday";
        if (days.length === 0) return "Never";
        return days.map(d => dayNames[d]).join(', ');
    }

  function getRingtoneName(type) {
    const names = { 
        'realalarm': '⏰ Real Alarm Clock',
        'classicclock': '🕰️ Classic Grandfather Clock',
        'guitar': '🎸 Acoustic Guitar',
        'piano': '🎹 Grand Piano',
        'birds': '🐦 Birds & Nature',
        'digital': '📱 Modern Digital',
        'morningchime': '🔔 Morning Chime',
        'sunrise': '🌅 Sunrise Melody',
        'dreamy': '💭 Dreamy Piano',
        'energetic': '⚡ Energetic Beat'
    };
    return names[type] || 'Real Alarm Clock';
}
    // Render alarms
    function renderAlarms() {
        const container = document.getElementById('alarmList');
        
        if (alarms.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 No alarms yet<br>Click + ADD NEW ALARM</div>';
            return;
        }
        
        container.innerHTML = alarms.map(alarm => {
            const timeDisplay = getTimeDisplay(alarm.hours, alarm.minutes);
            const ampm = alarm.hours >= 12 ? 'PM' : 'AM';
            
            return `
            <div class="alarm-card">
                <div>
                    <span class="alarm-time-large">${timeDisplay}</span>
                    <span class="alarm-ampm">${ampm}</span>
                </div>
                <div class="alarm-days">🔁 ${getDayNames(alarm.days)}</div>
                <div class="alarm-ringtone">🎵 ${getRingtoneName(alarm.ringtone)}</div>
                <div class="alarm-actions">
                    <label class="toggle-switch">
                        <input type="checkbox" ${alarm.enabled ? 'checked' : ''} onchange="toggleAlarm(${alarm.id}, this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                    <div class="action-buttons">
                        <button class="edit-btn" onclick="openEditModal(${alarm.id})">Edit</button>
                        <button class="delete-btn" onclick="deleteAlarm(${alarm.id})">Delete</button>
                    </div>
                </div>
            </div>
        `}).join('');
    }

    // Select Everyday in Modal
    function selectEverydayModal() {
        const allDays = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
        selectedDays = [...allDays];
        
        document.querySelectorAll('.modal-day-btn').forEach(btn => {
            if (allDays.includes(btn.dataset.day)) {
                btn.classList.add('active');
            }
        });
    }

    // Open Add Modal
   // Open Add Modal
function openAddModal() {
    editingAlarmId = null;
    document.getElementById('modalTitle').textContent = 'Add New Alarm';
    document.getElementById('modalTime').value = '07:00';
    selectedDays = [];
    document.querySelectorAll('.modal-day-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('modalRingtone').value = 'realalarm';
    document.getElementById('alarmModal').style.display = 'flex';
}

    // Open Edit Modal
    function openEditModal(id) {
        const alarm = alarms.find(a => a.id === id);
        if (!alarm) return;
        
        editingAlarmId = id;
        document.getElementById('modalTitle').textContent = 'Edit Alarm';
        
        const hours24 = alarm.hours;
        const timeValue = `${hours24.toString().padStart(2,'0')}:${alarm.minutes.toString().padStart(2,'0')}`;
        document.getElementById('modalTime').value = timeValue;
        
        selectedDays = [...alarm.days];
        document.querySelectorAll('.modal-day-btn').forEach(btn => {
            if (selectedDays.includes(btn.dataset.day)) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        document.getElementById('modalRingtone').value = alarm.ringtone;
        document.getElementById('alarmModal').style.display = 'flex';
    }

    // Save from modal
    function saveAlarmFromModal() {
        const timeValue = document.getElementById('modalTime').value;
        const ringtone = document.getElementById('modalRingtone').value;
        
        if (!timeValue) {
            alert("Please select time!");
            return;
        }
        
        const [hours, minutes] = timeValue.split(':');
        
        if (selectedDays.length === 0) {
            alert("Please select at least one day or click Everyday!");
            return;
        }
        
        if (editingAlarmId) {
            const index = alarms.findIndex(a => a.id === editingAlarmId);
            if (index !== -1) {
                alarms[index] = {
                    ...alarms[index],
                    hours: parseInt(hours),
                    minutes: parseInt(minutes),
                    days: [...selectedDays],
                    ringtone: ringtone
                };
            }
        } else {
            const newAlarm = {
                id: Date.now(),
                hours: parseInt(hours),
                minutes: parseInt(minutes),
                enabled: true,
                days: [...selectedDays],
                ringtone: ringtone
            };
            alarms.push(newAlarm);
        }
        
        saveAlarms();
        renderAlarms();
        closeModal();
        preloadAudio();
        showToast(editingAlarmId ? "✅ Alarm updated!" : "✅ New alarm added!");
    }

    // Close modal
    function closeModal() {
        document.getElementById('alarmModal').style.display = 'none';
        editingAlarmId = null;
    }

    // Delete alarm
    function deleteAlarm(id) {
        alarms = alarms.filter(a => a.id !== id);
        saveAlarms();
        renderAlarms();
        if (ringingAlarmId === id) stopRinging();
        showToast("❌ Alarm deleted");
    }

    // Toggle alarm
    function toggleAlarm(id, enabled) {
        const alarm = alarms.find(a => a.id === id);
        if (alarm) {
            alarm.enabled = enabled;
            saveAlarms();
            renderAlarms();
        }
    }

    // Check if alarm should ring today
    function shouldRingToday(alarm) {
        const today = new Date().getDay();
        for (let day of alarm.days) {
            if (dayMapping[day] === today) return true;
        }
        return false;
    }

    // Check alarms
    function checkAlarms() {
        const now = new Date();
        const currentHours = now.getHours();
        const currentMinutes = now.getMinutes();
        const currentSeconds = now.getSeconds();
        
        for (let alarm of alarms) {
            if (alarm.enabled && !ringingAlarmId && shouldRingToday(alarm)) {
                if (alarm.hours === currentHours && alarm.minutes === currentMinutes && currentSeconds === 0) {
                    triggerAlarm(alarm);
                    break;
                }
            }
        }
    }

    // Play ringtone - INSTRUMENTAL MUSIC RINGTONES
// Play full ringtone for alarm
// Play ringtone - REAL CLOCK SOUNDS
function playRingtoneByType(type) {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    if (audioContext.state === 'suspended') {
        audioContext.resume();
    }
    
    const now = audioContext.currentTime;
    
    const ringtones = {
        // 🎸 REAL GUITAR - Fingerstyle acoustic
        'guitar': () => {
            const guitarNotes = [
                { freq: 196.00, duration: 0.3 }, // G3
                { freq: 246.94, duration: 0.3 }, // B3
                { freq: 293.66, duration: 0.4 }, // D4
                { freq: 329.63, duration: 0.4 }, // E4
                { freq: 293.66, duration: 0.3 }, // D4
                { freq: 246.94, duration: 0.3 }, // B3
                { freq: 196.00, duration: 0.8 }  // G3
            ];
            playMelody(guitarNotes, 0.3);
        },
        
        // 🎹 REAL PIANO - Grand piano sound
        'piano': () => {
            const pianoNotes = [
                { freq: 261.63, duration: 0.4 }, // C4
                { freq: 293.66, duration: 0.3 }, // D4
                { freq: 329.63, duration: 0.3 }, // E4
                { freq: 349.23, duration: 0.4 }, // F4
                { freq: 392.00, duration: 0.4 }, // G4
                { freq: 349.23, duration: 0.3 }, // F4
                { freq: 329.63, duration: 0.3 }, // E4
                { freq: 293.66, duration: 0.4 }, // D4
                { freq: 261.63, duration: 0.8 }  // C4
            ];
            playMelody(pianoNotes, 0.35, 'triangle');
        },
        
        // 🐦 BIRDS + NATURE - Morning birds chirping
        'birds': () => {
            // Birds chirping effect - random high frequencies
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    if (!ringingAlarmId && !window.isPreviewing) return;
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    const birdFreq = [2200, 2400, 2600, 2800, 3000][Math.floor(Math.random() * 5)];
                    osc.frequency.value = birdFreq;
                    gain.gain.value = 0.15;
                    osc.type = 'sine';
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
                    osc.stop(audioContext.currentTime + 0.15);
                }, i * 250);
            }
            // Add nature melody
            setTimeout(() => {
                if (!ringingAlarmId && !window.isPreviewing) return;
                const natureMelody = [
                    { freq: 659.25, duration: 0.4 }, { freq: 523.25, duration: 0.4 },
                    { freq: 659.25, duration: 0.5 }, { freq: 783.99, duration: 0.6 }
                ];
                let timeOffset = 0;
                natureMelody.forEach((note) => {
                    setTimeout(() => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.type = 'sine';
                        osc.frequency.value = note.freq;
                        gain.gain.value = 0.25;
                        osc.start();
                        gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + note.duration);
                        osc.stop(audioContext.currentTime + note.duration);
                    }, timeOffset * 1000);
                    timeOffset += note.duration;
                });
            }, 200);
        },
        
        // ⏰ REAL ALARM CLOCK - Traditional mechanical alarm
        'realalarm': () => {
            // Classic double ring like old alarm clocks
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    if (!ringingAlarmId && !window.isPreviewing) return;
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = i % 2 === 0 ? 1200 : 1400;
                    gain.gain.value = 0.5;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.25);
                    osc.stop(audioContext.currentTime + 0.25);
                }, i * 350);
            }
        },
        
        // 🕰️ CLASSIC CLOCK - Grandfather clock chime
        'classicclock': () => {
            const chimeNotes = [
                { freq: 523.25, duration: 0.5 }, // C
                { freq: 659.25, duration: 0.5 }, // E
                { freq: 783.99, duration: 0.5 }, // G
                { freq: 1046.50, duration: 0.8 }, // C (high)
                { freq: 783.99, duration: 0.4 }, // G
                { freq: 659.25, duration: 0.4 }, // E
                { freq: 523.25, duration: 0.8 }  // C
            ];
            playMelody(chimeNotes, 0.4, 'sine');
        },
        
        // 📱 MODERN DIGITAL - Smartphone alarm
        'digital': () => {
            const digitalBeeps = [
                { freq: 1100, duration: 0.15 }, { freq: 0, duration: 0.1 },
                { freq: 1100, duration: 0.15 }, { freq: 0, duration: 0.1 },
                { freq: 1100, duration: 0.15 }, { freq: 0, duration: 0.1 },
                { freq: 1500, duration: 0.3 }, { freq: 0, duration: 0.15 },
                { freq: 1500, duration: 0.3 }
            ];
            let timeOffset = 0;
            digitalBeeps.forEach((note) => {
                setTimeout(() => {
                    if (!ringingAlarmId && !window.isPreviewing) return;
                    if (note.freq === 0) return;
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = note.freq;
                    gain.gain.value = 0.5;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + note.duration);
                    osc.stop(audioContext.currentTime + note.duration);
                }, timeOffset * 1000);
                timeOffset += note.duration + 0.05;
            });
        },
        
        // 🔔 MORNING CHIME - Gentle wake up
        'morningchime': () => {
            const chime = [
                { freq: 659.25, duration: 0.3 }, { freq: 783.99, duration: 0.3 },
                { freq: 1046.50, duration: 0.5 }, { freq: 783.99, duration: 0.3 },
                { freq: 659.25, duration: 0.3 }, { freq: 523.25, duration: 0.6 }
            ];
            playMelody(chime, 0.3, 'sine');
        },
        
        // 🌅 SUNRISE MELODY - Peaceful
        'sunrise': () => {
            const sunrise = [
                { freq: 440.00, duration: 0.4 }, { freq: 493.88, duration: 0.4 },
                { freq: 523.25, duration: 0.5 }, { freq: 587.33, duration: 0.5 },
                { freq: 659.25, duration: 0.6 }, { freq: 587.33, duration: 0.4 },
                { freq: 523.25, duration: 0.4 }, { freq: 440.00, duration: 0.8 }
            ];
            playMelody(sunrise, 0.35, 'triangle');
        },
        
        // 💤 DREAMY - Soft piano for gentle wake
        'dreamy': () => {
            const dreamy = [
                { freq: 261.63, duration: 0.6 }, { freq: 329.63, duration: 0.6 },
                { freq: 392.00, duration: 0.8 }, { freq: 329.63, duration: 0.6 },
                { freq: 261.63, duration: 0.6 }, { freq: 196.00, duration: 1.0 }
            ];
            playMelody(dreamy, 0.25, 'triangle');
        },
        
        // ⚡ ENERGETIC - Fast upbeat alarm
        'energetic': () => {
            const upbeat = [
                { freq: 880.00, duration: 0.15 }, { freq: 987.77, duration: 0.15 },
                { freq: 1108.73, duration: 0.15 }, { freq: 1318.52, duration: 0.2 },
                { freq: 1108.73, duration: 0.15 }, { freq: 987.77, duration: 0.15 },
                { freq: 880.00, duration: 0.15 }, { freq: 1318.52, duration: 0.3 }
            ];
            playMelody(upbeat, 0.4);
        }
    };
    
    function playMelody(melody, volume = 0.35, oscType = 'sine') {
        let timeOffset = 0;
        melody.forEach((note) => {
            setTimeout(() => {
                if (!ringingAlarmId && !window.isPreviewing) return;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.type = oscType;
                osc.frequency.value = note.freq;
                gain.gain.value = volume;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + note.duration);
                osc.stop(audioContext.currentTime + note.duration);
            }, timeOffset * 1000);
            timeOffset += note.duration;
        });
    }
    
    if (ringtones[type]) {
        ringtones[type]();
    } else {
        ringtones['realalarm']();
    }
}
  
    // Continuous ringing
    function startContinuousRing(ringtoneType) {
        function ring() {
            if (!ringingAlarmId) return;
            playRingtoneByType(ringtoneType);
        }
        
        ring();
        if (ringInterval) clearInterval(ringInterval);
        ringInterval = setInterval(() => {
            if (ringingAlarmId) {
                playRingtoneByType(ringtoneType);
            } else {
                clearInterval(ringInterval);
            }
        }, 1800);
    }

    // Trigger alarm
    function triggerAlarm(alarm) {
        ringingAlarmId = alarm.id;
        currentRingingAlarm = alarm;
        
        const now = new Date();
        const fullTime = getFullTimeWithAMPM(now.getHours(), now.getMinutes(), now.getSeconds());
        document.getElementById('ringingTime').textContent = fullTime;
        document.getElementById('ringingOverlay').style.display = 'flex';
        
        startContinuousRing(alarm.ringtone);
        
        if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
    }

    // Stop ringing
    function stopRinging() {
        if (ringInterval) {
            clearInterval(ringInterval);
            ringInterval = null;
        }
        ringingAlarmId = null;
        currentRingingAlarm = null;
        document.getElementById('ringingOverlay').style.display = 'none';
        if (audioContext) audioContext.suspend();
    }

    // Dismiss alarm
    function dismissAlarm() {
        if (currentRingingAlarm) {
            const alarm = alarms.find(a => a.id === currentRingingAlarm.id);
            if (alarm) {
                alarm.enabled = false;
                saveAlarms();
                renderAlarms();
            }
        }
        stopRinging();
        showToast("Alarm dismissed");
    }

    // Snooze alarm
    function snoozeAlarm(minutes) {
        if (currentRingingAlarm) {
            const originalAlarm = currentRingingAlarm;
            
            const now = new Date();
            let snoozeMins = now.getMinutes() + minutes;
            let snoozeHours = now.getHours();
            if (snoozeMins >= 60) {
                snoozeMins -= 60;
                snoozeHours++;
                if (snoozeHours >= 24) snoozeHours -= 24;
            }
            
            const snoozeAlarmObj = {
                id: Date.now(),
                hours: snoozeHours,
                minutes: snoozeMins,
                enabled: true,
                days: [...originalAlarm.days],
                ringtone: originalAlarm.ringtone
            };
            
            alarms.push(snoozeAlarmObj);
            saveAlarms();
            renderAlarms();
            showToast(`⏰ Snoozed for ${minutes} minutes!`);
        }
        stopRinging();
    }

    // Update ringing time display every second
    function updateRingingTime() {
        if (ringingAlarmId) {
            const now = new Date();
            const fullTime = getFullTimeWithAMPM(now.getHours(), now.getMinutes(), now.getSeconds());
            document.getElementById('ringingTime').textContent = fullTime;
        }
    }

    // Preload audio
    function preloadAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // Update clock
    function updateClock() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        
        document.getElementById('clockTime').textContent = `${hours}:${minutes}:${seconds}`;
        
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', options);
    }

    // Toast message
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '80px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = '#1a1a2e';
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.zIndex = '2000';
        toast.style.fontSize = '0.9em';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Initialize modal days buttons
    function initModalDays() {
        document.querySelectorAll('.modal-day-btn').forEach(btn => {
            if (btn.classList.contains('everyday-modal-btn')) return;
            btn.addEventListener('click', () => {
                const day = btn.dataset.day;
                if (selectedDays.includes(day)) {
                    selectedDays = selectedDays.filter(d => d !== day);
                    btn.classList.remove('active');
                } else {
                    selectedDays.push(day);
                    btn.classList.add('active');
                }
            });
        });
    }

    // Initialize
    function init() {
        initModalDays();
        loadAlarms();
        updateClock();
        setInterval(updateClock, 1000);
        setInterval(checkAlarms, 1000);
        setInterval(updateRingingTime, 1000);
        
        document.body.addEventListener('click', function initAudio() {
            preloadAudio();
            document.body.removeEventListener('click', initAudio);
        });
        
        window.onclick = function(event) {
            const modal = document.getElementById('alarmModal');
            if (event.target === modal) {
                closeModal();
            }
        };
    }
    // Preview ringtone function
let previewTimeout = null;

function previewRingtone() {
    const ringtoneType = document.getElementById('modalRingtone').value;
    
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    if (audioContext.state === 'suspended') {
        audioContext.resume();
    }
    
    window.isPreviewing = true;
    const originalRingingId = ringingAlarmId;
    ringingAlarmId = 'preview';
    
    playRingtoneByType(ringtoneType);
    
    setTimeout(() => {
        ringingAlarmId = originalRingingId;
        window.isPreviewing = false;
    }, 2000);
}

window.isPreviewing = false;

    init();
    // PWA Registration with Auto-Update Check
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').then(reg => {
            // Check for updates every 1 minute
            setInterval(() => { reg.update(); }, 60000);

            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        if (confirm("New update available! Refresh to apply changes?")) {
                            newWorker.postMessage({ action: 'skipWaiting' });
                            window.location.reload();
                        }
                    }
                });
            });
        }).catch(err => console.log("Service Worker Error:", err));
    });
}
</script>
